<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lab5 JavaScript</title>
    <link rel="stylesheet" href="lab5.css">
</head>

<body>

    <button id="btn" onclick="time_now()">Show Current Date</button>
    <p id="date"></p>
    <p id="time"></p>

    <br>

    <form>
        Name    
        <input
        type="text"
        id="name"
        placeholder="Name"
        required
        minlength="4"
        maxlength="30"
        size="10"
        >
        <br>
        Age  
        <input 
        type="number"
        id="age"
        placeholder="Age"
        required
        min="1"
        >
        <br>
        Email
        <input
        type="email"
        id="email"
        placeholder="Email"
        >
        <br>
    <label for="course-select">Choose your course</label>
        <select name="Courses" id="course-select">
        <option value="">Please Choose a Course</option>
        <option>BA Food Appreciation</option>
        <option>BA Applied Poetry of the Future</option>
        <option>BS Computer Repair Shop</option>
        <option>BS Video Gaming</option>
        <option>BS Installing and Downloading</option>
        
    </select>
    <br>
        <button id="submit" onclick = "add_student(event)">Submit</button>
    </form>
    <br>
    <div id = "search">
        <button id="search_student" onclick = find_student()>Search Student</button>
        <input type="text"
        id="student_name_query" 
        placeholder="Search Name" 
        minlength="4"
        maxlength="30"
        size="10">
        <table id = "search_results"></table>
    </div>
    <br>
    <div id = "display">
        <button id="display_all" type = "button" onclick = "display_list()">Display All</button>
        <table id = "display_table"></table>
    </div>
    <br>
    <button id = "save_data" onclick="saveData()">Save Data</button>
    <button id = "load_data" onclick="loadData()">Load Data</button>
    <button id = "clear_data" onclick="clearData()">Clear Data</button>
    <script src="lab5.js"></script>
    
</body>
</html>
